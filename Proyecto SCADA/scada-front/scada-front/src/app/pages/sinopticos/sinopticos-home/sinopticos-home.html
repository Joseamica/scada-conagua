<app-header-bar />

<div class="sinopticos-page">
  <div class="page-header">
    <h1>Sinopticos</h1>
    <button class="btn-primary" (click)="openCreateDialog()">
      <ng-icon name="heroPlus" size="18" />
      Nuevo Proyecto
    </button>
  </div>

  <div class="projects-grid" *ngIf="!loading(); else loadingTpl">
    <div
      *ngFor="let project of projects()"
      class="project-card"
      (click)="openProject(project)"
    >
      <div class="card-icon">
        <ng-icon [name]="project.is_public ? 'heroGlobeAlt' : 'heroLockClosed'" size="28" />
      </div>
      <div class="card-body">
        <h3 class="card-title">{{ project.name }}</h3>
        <p class="card-desc" *ngIf="project.description">{{ project.description }}</p>
        <div class="card-meta">
          <span>{{ project.sinoptico_count }} sinoptico{{ project.sinoptico_count !== 1 ? 's' : '' }}</span>
          <span class="separator">|</span>
          <span>{{ project.owner_name }}</span>
        </div>
      </div>
      <div class="card-actions">
        <button class="btn-icon btn-danger" (click)="deleteProject(project, $event)" title="Eliminar">
          <ng-icon name="heroTrash" size="16" />
        </button>
      </div>
    </div>

    <div class="empty-state" *ngIf="projects().length === 0">
      <ng-icon name="heroFolder" size="48" />
      <p>No hay proyectos de sinopticos</p>
      <button class="btn-primary" (click)="openCreateDialog()">Crear primer proyecto</button>
    </div>
  </div>

  <ng-template #loadingTpl>
    <div class="loading-state">
      <div class="spinner"></div>
      <p>Cargando proyectos...</p>
    </div>
  </ng-template>
</div>

<!-- Create Dialog -->
<div class="dialog-overlay" *ngIf="showCreateDialog()" (click)="showCreateDialog.set(false)">
  <div class="dialog" (click)="$event.stopPropagation()">
    <h2>Nuevo Proyecto</h2>
    <div class="form-group">
      <label>Nombre *</label>
      <input type="text" [(ngModel)]="newProjectName" placeholder="Nombre del proyecto" autofocus />
    </div>
    <div class="form-group">
      <label>Descripcion</label>
      <textarea [(ngModel)]="newProjectDescription" placeholder="Descripcion opcional" rows="3"></textarea>
    </div>
    <div class="form-group form-check">
      <label>
        <input type="checkbox" [(ngModel)]="newProjectPublic" />
        Proyecto publico (visible para todos los usuarios)
      </label>
    </div>
    <div class="dialog-actions">
      <button class="btn-secondary" (click)="showCreateDialog.set(false)">Cancelar</button>
      <button class="btn-primary" (click)="createProject()" [disabled]="!newProjectName.trim()">Crear</button>
    </div>
  </div>
</div>

<app-footer-tabs />
