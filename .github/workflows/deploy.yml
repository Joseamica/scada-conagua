name: Deploy to Production

on:
  push:
    branches: [main]

concurrency:
  group: production-deploy
  cancel-in-progress: false

env:
  BACKEND_HOST: 163.192.129.35
  WEBSERVER_HOST: 159.54.157.79
  DEPLOY_USER: opc

jobs:
  # ─── Frontend ───
  deploy-frontend:
    name: Build & Deploy Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Proyecto SCADA/scada-front/scada-front
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Proyecto SCADA/scada-front/scada-front/package-lock.json

      - run: npm ci
      - run: npm run build

      - name: Deploy to webserver
        env:
          SSH_KEY: ${{ secrets.OCI_WEBSERVER_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H $WEBSERVER_HOST >> ~/.ssh/known_hosts 2>/dev/null

          # Backup current deploy
          ssh -i ~/.ssh/deploy_key $DEPLOY_USER@$WEBSERVER_HOST \
            "sudo cp -r /usr/share/nginx/html/SCADA /tmp/scada-backup-\$(date +%Y%m%d%H%M%S)" || true

          # Upload new build
          ssh -i ~/.ssh/deploy_key $DEPLOY_USER@$WEBSERVER_HOST "rm -rf /tmp/scada-deploy && mkdir -p /tmp/scada-deploy"
          rsync -az -e "ssh -i ~/.ssh/deploy_key" \
            dist/scada-demo/browser/ \
            $DEPLOY_USER@$WEBSERVER_HOST:/tmp/scada-deploy/

          # Swap into nginx
          ssh -i ~/.ssh/deploy_key $DEPLOY_USER@$WEBSERVER_HOST \
            "sudo rm -rf /usr/share/nginx/html/SCADA/* && sudo cp -r /tmp/scada-deploy/* /usr/share/nginx/html/SCADA/ && rm -rf /tmp/scada-deploy"

          echo "Frontend deployed"

  # ─── Backend (Query API) ───
  deploy-backend:
    name: Deploy Backend API
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.OCI_BACKEND_SSH_KEY }}" > ~/.ssh/backend_key
          chmod 600 ~/.ssh/backend_key
          ssh-keyscan -H $BACKEND_HOST >> ~/.ssh/known_hosts 2>/dev/null

      - name: Tag current image for rollback
        run: |
          ssh -i ~/.ssh/backend_key $DEPLOY_USER@$BACKEND_HOST \
            "docker tag opc-scada-query-api:latest opc-scada-query-api:previous 2>/dev/null || true"

      - name: Sync source files
        run: |
          rsync -az -e "ssh -i ~/.ssh/backend_key" \
            "Proyecto SCADA/scada-query-api/scada-query-api/src/" \
            $DEPLOY_USER@$BACKEND_HOST:/home/opc/scada-query-api/src/

          rsync -az -e "ssh -i ~/.ssh/backend_key" \
            "Proyecto SCADA/scada-query-api/scada-query-api/migrations/" \
            $DEPLOY_USER@$BACKEND_HOST:/home/opc/scada-query-api/migrations/

          rsync -az -e "ssh -i ~/.ssh/backend_key" \
            "Proyecto SCADA/scada-query-api/scada-query-api/package.json" \
            "Proyecto SCADA/scada-query-api/scada-query-api/package-lock.json" \
            "Proyecto SCADA/scada-query-api/scada-query-api/tsconfig.json" \
            $DEPLOY_USER@$BACKEND_HOST:/home/opc/scada-query-api/

      - name: Build and restart container
        run: |
          ssh -i ~/.ssh/backend_key $DEPLOY_USER@$BACKEND_HOST << 'EOF'
          cd /home/opc
          docker compose build scada-query-api
          docker stop scada_query_api 2>/dev/null || true
          docker rm scada_query_api 2>/dev/null || true
          docker compose up -d --no-deps scada-query-api
          EOF

      - name: Verify service is running
        run: |
          ssh -i ~/.ssh/backend_key $DEPLOY_USER@$BACKEND_HOST << 'EOF'
          sleep 5
          echo "=== Container Status ==="
          docker ps --format "table {{.Names}}\t{{.Status}}" | grep scada
          echo ""
          echo "=== Health Check ==="
          curl -sf http://localhost:3001/ || echo "HEALTH CHECK FAILED"
          echo ""
          echo "=== Last 5 logs ==="
          docker logs scada_query_api --tail 5 2>&1
          EOF

      - name: Rollback on failure
        if: failure()
        run: |
          ssh -i ~/.ssh/backend_key $DEPLOY_USER@$BACKEND_HOST << 'EOF'
          echo "ROLLBACK: Restoring previous image..."
          docker stop scada_query_api 2>/dev/null || true
          docker rm scada_query_api 2>/dev/null || true
          docker tag opc-scada-query-api:previous opc-scada-query-api:latest 2>/dev/null || true
          cd /home/opc && docker compose up -d --no-deps scada-query-api
          echo "ROLLBACK COMPLETE"
          EOF
