name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  # ─── Frontend ───
  deploy-frontend:
    name: Build & Deploy Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Proyecto SCADA/scada-front/scada-front
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Proyecto SCADA/scada-front/scada-front/package-lock.json

      - run: npm ci
      - run: npm run build

      - name: Deploy to Oracle Cloud
        env:
          SSH_KEY: ${{ secrets.OCI_WEBSERVER_SSH_KEY }}
          HOST: 159.54.157.79
          USER: opc
          DEPLOY_PATH: /usr/share/nginx/html/SCADA
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H $HOST >> ~/.ssh/known_hosts 2>/dev/null

          ssh -i ~/.ssh/deploy_key $USER@$HOST "sudo cp -r $DEPLOY_PATH /tmp/scada-backup-\$(date +%Y%m%d%H%M%S) && mkdir -p /tmp/scada-deploy" || true

          scp -i ~/.ssh/deploy_key -r dist/scada-demo/browser/* $USER@$HOST:/tmp/scada-deploy/

          ssh -i ~/.ssh/deploy_key $USER@$HOST "sudo rm -rf $DEPLOY_PATH/* && sudo cp -r /tmp/scada-deploy/* $DEPLOY_PATH/ && rm -rf /tmp/scada-deploy"

          echo "Frontend deployed successfully"

  # ─── Backend ───
  deploy-backend:
    name: Deploy Backend APIs
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.OCI_BACKEND_SSH_KEY }}" > ~/.ssh/backend_key
          chmod 600 ~/.ssh/backend_key
          ssh-keyscan -H ${{ secrets.OCI_BACKEND_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Pull latest code on server
        run: |
          ssh -i ~/.ssh/backend_key opc@${{ secrets.OCI_BACKEND_HOST }} \
            "cd /home/opc/scada-prod && git pull origin main"

      - name: Tag current images for rollback
        run: |
          ssh -i ~/.ssh/backend_key opc@${{ secrets.OCI_BACKEND_HOST }} << 'EOF'
          docker tag scada-query-api:latest scada-query-api:previous 2>/dev/null || true
          docker tag scada-ingestion-api:latest scada-ingestion-api:previous 2>/dev/null || true
          EOF

      - name: Build new images
        run: |
          ssh -i ~/.ssh/backend_key opc@${{ secrets.OCI_BACKEND_HOST }} << 'EOF'
          cd /home/opc/scada-prod/"Proyecto SCADA"
          docker compose -f docker-compose.prod.yml --env-file /home/opc/scada.env \
            build scada-query-api scada-ingestion-api
          EOF

      - name: Run database migrations
        run: |
          ssh -i ~/.ssh/backend_key opc@${{ secrets.OCI_BACKEND_HOST }} << 'EOF'
          cd /home/opc/scada-prod/"Proyecto SCADA"
          docker compose -f docker-compose.prod.yml --env-file /home/opc/scada.env \
            run --rm scada-query-api node dist/migrate.js
          EOF

      - name: Restart backend services
        run: |
          ssh -i ~/.ssh/backend_key opc@${{ secrets.OCI_BACKEND_HOST }} << 'EOF'
          cd /home/opc/scada-prod/"Proyecto SCADA"
          docker compose -f docker-compose.prod.yml --env-file /home/opc/scada.env \
            up -d --no-build scada-query-api scada-ingestion-api
          EOF

      - name: Verify services are running
        run: |
          ssh -i ~/.ssh/backend_key opc@${{ secrets.OCI_BACKEND_HOST }} << 'EOF'
          sleep 10
          echo "=== Container Status ==="
          docker ps --format "table {{.Names}}\t{{.Status}}" | grep scada
          echo ""
          echo "=== Query API logs (last 5) ==="
          docker logs scada_query_api --tail 5 2>&1
          echo ""
          echo "=== Ingestion API logs (last 5) ==="
          docker logs scada_ingestion_api --tail 5 2>&1
          EOF

      - name: Rollback on failure
        if: failure()
        run: |
          ssh -i ~/.ssh/backend_key opc@${{ secrets.OCI_BACKEND_HOST }} << 'EOF'
          echo "ROLLBACK: Restoring previous images..."
          docker tag scada-query-api:previous scada-query-api:latest 2>/dev/null || true
          docker tag scada-ingestion-api:previous scada-ingestion-api:latest 2>/dev/null || true
          cd /home/opc/scada-prod/"Proyecto SCADA"
          docker compose -f docker-compose.prod.yml --env-file /home/opc/scada.env \
            up -d --no-build scada-query-api scada-ingestion-api
          echo "ROLLBACK COMPLETE"
          EOF
